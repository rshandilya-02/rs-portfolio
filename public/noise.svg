<svg
        className="w-full h-full"
        viewBox="0 0 2000 2000"
        xmlns="http://www.w3.org/2000/svg"
        preserveAspectRatio="none"
      >
        <filter
          id="noiseFilter"
          x="0"
          y="0"
          width="100%"
          height="100%"
          filterUnits="userSpaceOnUse"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="1"
            numOctaves="2"
            stitchTiles="stitch"
          />
        </filter>

        <rect
          x="0"
          y="0"
          width="100%"
          height="100%"
          filter="url(#noiseFilter)"
        />
      </svg>
